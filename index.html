<template id="weatherTmpl">
{{#disableCalcHeight}}
    <div data-widgetname="WEATHER" class="widget js-widget_nocalc widget__weather">
{{/disableCalcHeight}}
{{^disableCalcHeight}}
    <div data-widgetname="WEATHER" class="widget widget__weather"  style="height: {{storedHeight}}">
{{/disableCalcHeight}}
    <span class="widget__overlay"></span>
    <div class="widget__actions" data-popup-url="ajax/settings.html">
        <i title="Einstellungen bearbeiten" class="far fa-cog widget__settings js-widget-settings"></i>
        <i title="Widget entfernen" class="far fa-trash-alt widget__trash js-widget__trash"></i>
    </div>
    <div class="widget__content">
        <div class="container">
            <div class="row widget__weather-entry text-center">
                {{#content}}
                        <div class="col-4">
                        {{#weather}}
                            <img src="images/weather/{{icon}}.png" class="widget__weather-image">
                        {{/weather}}
                        {{#main}}
                            <div class="widget__weather-minmax">
                                {{temp_min}} °C / {{temp_max}} °C
                            </div>
                        {{/main}}
                        </div>
                        <div class="col-8 text-left widget__weather-wrapper">
                        {{#main}}
                            <div class="widget__weather-temp">
                                {{temp}} °C
                            </div>
                        {{/main}}
                        <div class="widget__weather-description">
                            <div class="widget__weather-info">{{#weather}}{{description}}{{/weather}}</div>
                            <div class="widget__weather-wind">Wind: {{#wind}}{{speed}}{{/wind}} m/s</div>
                            <div class="widget__weather-cloudy">wolkig: {{#clouds}}{{all}}{{/clouds}}%</div>
                        </div>
                        </div>

                {{/content}}
            </div>
        </div>

    </div>
</div>
</template>
