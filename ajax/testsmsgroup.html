<div id="testSmsGroupModal" class="modal" tabindex="-1" role="dialog">
    <div class="container modal-dialog modal-dialog__login" role="document">
        <div class="container modal-content">
            <div class="modal-header">
                <h2 class="modal-title">SMS an Gruppen Schnittstelle</h2>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body modal-body__content">
                <div class="container">
                    <div class="row">
                        <div class="col-12 message message_error text-center">

                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12 message message_ok text-center">

                        </div>
                    </div>                    
                </div>
                <div class="container">
                    <div class="row">
                        <div class="col-12">
                            <strong>Hier müssen sie die Gruppe auswählen die eine SMS erhalten soll</strong>
                        </div>
                    </div>
                </div>
                <form id="testSmsFormGroup" action="php/testsmsgroup.php">
                <div class="container form-container">
                    <div class="form-group">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="testsms" name="testchkb" id="flexCheckDefault">
                            <label class="form-check-label" for="flexCheckDefault">
                              TestSMS (Title - Nachricht wird nicht beachtet. es steht nur "FFW Test" "Das ist ein Test")
                            </label>
                          </div>
                    </div>                    
                    <div class="form-group" id="alarm_group_container">
                    </div>
                    <div class="form-group">
                        <input name="titletxt" id="titletext" type="text" class="form-control logininput" maxlength="11" placeholder="Ihr beliebiger Title"/>
                    </div>                    
                    <div class="form-group">
                        <input name="msgtext" id="msgtext" type="text" class="form-control logininput" placeholder="Ihr beliebiger Text"/>
                    </div>
                </div>
                <input type="hidden" id="apitoken" name="apitoken" value="">
                <input type="hidden" id="action" name="action" value="testSmsGroup">
                </form>
                <script>

                    $(document).ready(function() {
                        $('#flexCheckDefault').change(function() {
                            if($(this).is(":checked")) {
                                $("#titletext").hide();
                                $("#msgtext").hide();
                            }else{
                                $("#titletext").show();
                                $("#msgtext").show();                            
                            }
                            
                        });
                    });
    
                    </script>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary js-btn-sendsmsgroup">SMS Senden</button>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Schließen</button>
            </div>
        </div>
    </div>
</div>
